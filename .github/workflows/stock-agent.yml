name: AGENT21

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 15 * * *'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run agent
        run: node agent.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - name: Commit and push history update
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Dočasně schováme vytvořený history.json
          git stash
          
          # 2. Bezpečný pull --rebase
          git pull --rebase origin main
          
          # 3. Vrátíme schovanou historii zpět
          git stash pop || true
          
          # 4. Přidáme ji a uložíme
          git add history.json || true
          
          if git diff --cached --quiet; then
            echo "Žádné změny v historii k uložení."
          else
            git commit -m "Automatická aktualizace historie trhu [skip ci]"
            git push origin main
          fi