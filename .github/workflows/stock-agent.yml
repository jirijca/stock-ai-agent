name: AGENT23

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Spustit v testovacím režimu (přeskočí kontrolu dne)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # 14:00 UTC je 16:00 SELČ (30 minut po otevření US trhů v 15:30)
    - cron: '0 14 * * 1-5'

jobs:
  run-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run agent
        run: node agent.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TEST_MODE: ${{ github.event.inputs.test_mode }}

      - name: Commit and push history update
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main

          if [ -f history.json ]; then
            git add history.json
          fi

          if git diff --cached --quiet; then
            echo "Žádné změny v historii k uložení."
          else
            git commit -m "Automatická aktualizace historie trhu [skip ci]"
            git push origin main
          fi